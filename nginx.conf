# ═══════════════════════════════════════════════════════════════
# Emare Finance — Nginx Zero-Downtime Yapılandırması
# Dosya: /etc/nginx/sites-available/emarefinance.com
#
# Symlink tabanlı deploy ile uyumlu:
#   /var/www/emare-finance/current → releases/20260301_150000
#   Nginx, current symlink üzerinden çalışır.
#   Deploy sırasında kesinti OLMAZ.
# ═══════════════════════════════════════════════════════════════

# ─── Upstream: PHP-FPM bağlantısı ───
upstream php-fpm {
    server unix:/var/run/php/php8.2-fpm.sock;
    # Birden fazla FPM havuzu için:
    # server unix:/var/run/php/php8.2-fpm-emare.sock weight=5;
}

# ─── HTTP → HTTPS Yönlendirme ───
server {
    listen 80;
    listen [::]:80;
    server_name emarefinance.com www.emarefinance.com;

    # ACME challenge (SSL sertifika yenileme)
    location /.well-known/acme-challenge/ {
        root /var/www/emare-finance/current/public;
    }

    return 301 https://$server_name$request_uri;
}

# ─── Ana HTTPS Server ───
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name emarefinance.com www.emarefinance.com;

    # ⚡ SYMLINK TABANLI ROOT — Deploy sırasında değişmez
    root /var/www/emare-finance/current/public;
    index index.php;

    # ─── SSL ───
    ssl_certificate /etc/letsencrypt/live/emarefinance.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/emarefinance.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    # ─── Güvenlik Başlıkları ───
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ─── Performans ───
    client_max_body_size 50M;
    client_body_buffer_size 128k;
    fastcgi_buffers 16 16k;
    fastcgi_buffer_size 32k;
    fastcgi_read_timeout 300;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain text/css application/json application/javascript
        text/xml application/xml application/xml+rss text/javascript
        image/svg+xml application/vnd.ms-fontobject application/x-font-ttf
        font/opentype;

    # ─── Health Check Endpoint ───
    location /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'OK';
    }

    # ─── SSE (Server-Sent Events) — AI Chat Streaming ───
    location /sohbet/gonder {
        fastcgi_pass php-fpm;
        fastcgi_param SCRIPT_FILENAME $realpath_root/index.php;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;

        # SSE için özel ayarlar
        fastcgi_buffering off;
        fastcgi_cache off;
        proxy_buffering off;
        chunked_transfer_encoding on;
        fastcgi_read_timeout 120;
        fastcgi_keep_conn on;
    }

    # ─── Ana Konum ───
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ─── PHP İşleme ───
    # realpath_root kullanılıyor: symlink'i resolve eder → doğru release'e yönlendirir
    location ~ \.php$ {
        fastcgi_pass php-fpm;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;

        # OPcache symlink uyumluluğu
        fastcgi_param PHP_VALUE "opcache.revalidate_freq=0";
    }

    # ─── Statik Dosya Cache ───
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # ─── Gizli Dosyaları Engelle ───
    location ~ /\.(?!well-known) {
        deny all;
    }

    # ─── Hassas Dizinleri Engelle ───
    location ~ ^/(vendor|node_modules|storage/logs|database)/ {
        deny all;
    }

    # ─── Loglar ───
    access_log /var/log/nginx/emarefinance-access.log combined buffer=512k flush=1m;
    error_log /var/log/nginx/emarefinance-error.log warn;
}
