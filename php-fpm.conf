; ═══════════════════════════════════════════════════════════════
; Emare Finance — PHP-FPM Pool Yapılandırması
; Dosya: /etc/php/8.2/fpm/pool.d/emare.conf
;
; Symlink tabanlı zero-downtime deploy ile uyumlu.
; OPcache realpath cache ile artırılmış performans.
; ═══════════════════════════════════════════════════════════════

[emare]
user = www-data
group = www-data

; Unix socket (nginx upstream ile eşleşmeli)
listen = /var/run/php/php8.2-fpm-emare.sock
listen.owner = www-data
listen.group = www-data
listen.mode = 0660

; ─── Process Yönetimi ───
; dynamic: ihtiyaca göre ölçekler
pm = dynamic
pm.max_children = 20
pm.start_servers = 5
pm.min_spare_servers = 2
pm.max_spare_servers = 8
pm.max_requests = 1000
pm.process_idle_timeout = 10s

; ─── Status Endpoint (health-check için) ───
pm.status_path = /fpm-status
ping.path = /fpm-ping
ping.response = pong

; ─── Timeout ───
request_terminate_timeout = 300
request_slowlog_timeout = 10s
slowlog = /var/log/php-fpm/emare-slow.log

; ─── Log ───
access.log = /var/log/php-fpm/emare-access.log
access.format = "%R - %u %t \"%m %r%Q%q\" %s %f %{mili}d %{kilo}M %C%%"

; ─── Environment ───
env[APP_ENV] = production
env[APP_DEBUG] = false

; ─── PHP Ayarları ───
; Symlink deploy uyumluluğu: realpath_cache kapatılır
; böylece yeni release'e geçiş anında eski dosyalar cache'den okunmaz
php_admin_value[realpath_cache_size] = 0
php_admin_value[realpath_cache_ttl] = 0

; OPcache — revalidate her istekte (symlink geçişi için)
php_admin_value[opcache.revalidate_freq] = 0
php_admin_value[opcache.validate_timestamps] = 1
php_admin_value[opcache.max_accelerated_files] = 20000
php_admin_value[opcache.memory_consumption] = 256
php_admin_value[opcache.interned_strings_buffer] = 16
php_admin_value[opcache.enable] = 1
php_admin_value[opcache.enable_cli] = 0

; Upload limitleri
php_admin_value[upload_max_filesize] = 50M
php_admin_value[post_max_size] = 50M
php_admin_value[memory_limit] = 256M
php_admin_value[max_execution_time] = 300
php_admin_value[max_input_vars] = 5000

; Güvenlik
php_admin_value[expose_php] = Off
php_admin_value[display_errors] = Off
php_admin_value[log_errors] = On
php_admin_value[error_log] = /var/log/php-fpm/emare-php-error.log
